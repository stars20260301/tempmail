# ============================================================
# TempMail 临时邮箱平台 - Docker Compose
# 高并发架构: PostgreSQL + PgBouncer + Redis + Go API + Postfix
# ============================================================
name: tempmail

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ==================== PgBouncer (连接池) ====================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ==================== Redis ====================
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "128mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--tcp-backlog"
      - "511"
      - "--timeout"
      - "300"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ==================== Go API 服务 ====================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      DB_DSN: ${API_DB_DSN}
      REDIS_ADDR: ${API_REDIS_ADDR}
      REDIS_PASSWORD: ${API_REDIS_PASSWORD}
      RATE_LIMIT: ${API_RATE_LIMIT}
      RATE_WINDOW: ${API_RATE_WINDOW}
      PORT: ${API_PORT}
      SMTP_SERVER_IP: ${SMTP_SERVER_IP}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}
      ADMIN_KEY_FILE: /data/admin.key
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - internal

  # ==================== 前端 Nginx ====================
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - internal

  # ==================== Postfix 收件服务 ====================
  postfix:
    build:
      context: .
      dockerfile: postfix/Dockerfile
    restart: unless-stopped
    ports:
      - "25:25"
    environment:
      DB_DSN: ${API_DB_DSN}
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
